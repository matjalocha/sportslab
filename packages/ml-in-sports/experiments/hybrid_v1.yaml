name: "Hybrid Ensemble v1"
description: "LGB + XGB + TabPFN + LogReg stacking meta-learner, calibrated, quarter-Kelly"

data:
  leagues:
    - "ENG-Premier League"
    - "ESP-La Liga"
    - "GER-Bundesliga"
    - "ITA-Serie A"
    - "FRA-Ligue 1"
  seasons: ["2122", "2223", "2324", "2425"]
  markets: ["1x2", "over_under_25", "btts"]

models:
  - name: "lightgbm"
    type: lightgbm
    params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 6
      num_leaves: 31
      subsample: 0.8
      colsample_bytree: 0.8

  - name: "xgboost"
    type: xgboost
    params:
      n_estimators: 500
      learning_rate: 0.05
      max_depth: 6
      subsample: 0.8
      colsample_bytree: 0.8

  - name: "tabpfn"
    type: tabpfn
    params:
      n_estimators: 8

  - name: "hybrid"
    type: stacking
    base_models: ["lightgbm", "xgboost", "tabpfn"]
    meta_learner: logistic_regression

calibration:
  methods: [temperature, platt, isotonic]
  selection: walk_forward

kelly:
  fraction: 0.25
  max_exposure_per_match: 0.03
  max_exposure_per_round: 0.15
  shrinkage: true

evaluation:
  walk_forward:
    train_seasons: 3
    test_season: 1
  metrics:
    - log_loss
    - ece
    - brier_score
    - clv_mean
    - roi
    - sharpe
    - max_drawdown
    - max_losing_streak
  pinnacle_source: football-data

report:
  format: [html, terminal]
  include:
    - calibration_curves
    - ece_per_league
    - clv_timeseries
    - roi_cumulative
    - feature_importance_top20
    - model_comparison_table
    - kelly_stake_distribution
