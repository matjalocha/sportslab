name: sportslab

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sportslab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sportslab}
      POSTGRES_DB: ${POSTGRES_DB:-sportslab}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportslab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPORTSLAB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sportslab}:${POSTGRES_PASSWORD:-sportslab}@postgres:5432/${POSTGRES_DB:-sportslab}
      SPORTSLAB_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      SPORTSLAB_CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      SPORTSLAB_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SPORTSLAB_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SPORTSLAB_ENV: dev
    ports:
      - "8000:8000"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    restart: unless-stopped
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

volumes:
  postgres_data:
  mlflow_data:
