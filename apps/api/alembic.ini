# SportsLab API -- Alembic configuration.
#
# sqlalchemy.url is intentionally blank here. ``alembic/env.py`` populates
# it at runtime from ``SPORTSLAB_DATABASE_URL`` (or the fallback
# ``sqlite:///./local.db`` for developers without a running Postgres).
# Never commit a connection string with credentials to this file.
#
# Run migrations from the monorepo root, pointing at this config:
#
#     uv run alembic -c apps/api/alembic.ini upgrade head
#     uv run alembic -c apps/api/alembic.ini revision -m "desc" --autogenerate

[alembic]
# Location of migration scripts, resolved relative to this ini file.
script_location = alembic

# Append monorepo-local paths so ``from api.db.models import Base`` works
# inside env.py. ``prepend_sys_path`` is relative to this ini file.
prepend_sys_path = src

# OS-native path separator for ``prepend_sys_path`` (Alembic 1.18+ warns
# when this is missing and defaults to whitespace/comma/colon splitting).
path_separator = os

# File naming: timestamp + slug keeps migrations sorted without relying on
# the in-file ``down_revision`` chain when diffing migration directories.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# UTC timestamps in migration filenames -- we're a distributed team.
timezone = UTC

# Blank at rest; env.py injects the real URL from the environment.
sqlalchemy.url =


[post_write_hooks]
# Run ruff format + check on newly generated migrations so the committed
# file matches the repo style. Keeps autogenerate output reviewable.
hooks = ruff_format, ruff_check

ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
