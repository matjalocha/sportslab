services:
  pipeline:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    env_file:
      - .env
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      - ../predictions:/app/predictions
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sportslab
      POSTGRES_USER: sportslab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportslab -d sportslab"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  pgdata:
