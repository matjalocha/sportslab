    <circle cx="1560" cy="520" r="12" fill="#5B67F2" opacity="0.3" filter="url(#pointGlow)"></circle>
    <circle cx="1560" cy="520" r="3" fill="#6FE39A"></circle>
    <circle cx="1560" cy="520" r="1.1" fill="#0B0D14"></circle>

    
    <circle cx="1700" cy="306" r="16" fill="#22C55E" opacity="0.35" filter="url(#pointGlow)"></circle>
    <g stroke="#22C55E" stroke-width="1" stroke-linecap="round" opacity="0.4" filter="url(#starburstGlow)">
      <line x1="1700" y1="282" x2="1700" y2="330"></line>
      <line x1="1676" y1="306" x2="1724" y2="306"></line>
      <line x1="1683" y1="289" x2="1717" y2="323"></line>
      <line x1="1717" y1="289" x2="1683" y2="323"></line>
    </g>
    <circle cx="1700" cy="306" r="3.6" fill="#22C55E"></circle>
    <circle cx="1700" cy="306" r="1.3" fill="#0B0D14"></circle>
