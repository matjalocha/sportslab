    <circle cx="640" cy="670" r="1" opacity="0.19"></circle>
    <circle cx="710" cy="180" r="1" opacity="0.16"></circle>
    <circle cx="780" cy="560" r="1" opacity="0.23"></circle>
    <circle cx="830" cy="880" r="1" opacity="0.15"></circle>
    <circle cx="910" cy="340" r="1" opacity="0.21"></circle>
    <circle cx="980" cy="640" r="1" opacity="0.18"></circle>
    <circle cx="1040" cy="250" r="1" opacity="0.17"></circle>
    <circle cx="150" cy="910" r="1" opacity="0.20"></circle>
    <circle cx="340" cy="140" r="1" opacity="0.15"></circle>
    <circle cx="520" cy="280" r="1" opacity="0.22"></circle>
    <circle cx="680" cy="460" r="1" opacity="0.16"></circle>
    <circle cx="860" cy="740" r="1" opacity="0.19"></circle>
  </g>

  
  <g opacity="0.55">
    <g stroke="#2A3250" stroke-width="1" opacity="0.6">
      <line x1="0" y1="220" x2="1920" y2="220"></line>
      <line x1="0" y1="320" x2="1920" y2="320"></line>
      <line x1="0" y1="420" x2="1920" y2="420"></line>
      <line x1="0" y1="520" x2="1920" y2="520"></line>
      <line x1="0" y1="620" x2="1920" y2="620"></line>
      <line x1="0" y1="720" x2="1920" y2="720"></line>
      <line x1="0" y1="820" x2="1920" y2="820"></line>
      <line x1="240" y1="0" x2="240" y2="1080"></line>
      <line x1="440" y1="0" x2="440" y2="1080"></line>
      <line x1="640" y1="0" x2="640" y2="1080"></line>
      <line x1="840" y1="0" x2="840" y2="1080"></line>
      <line x1="1040" y1="0" x2="1040" y2="1080"></line>
      <line x1="1240" y1="0" x2="1240" y2="1080"></line>
      <line x1="1440" y1="0" x2="1440" y2="1080"></line>
      <line x1="1640" y1="0" x2="1640" y2="1080"></line>
    </g>
    <g stroke="#1E2236" stroke-width="0.6" opacity="0.55">
      <line x1="0" y1="270" x2="1920" y2="270"></line>
      <line x1="0" y1="370" x2="1920" y2="370"></line>
      <line x1="0" y1="470" x2="1920" y2="470"></line>
      <line x1="0" y1="570" x2="1920" y2="570"></line>
      <line x1="0" y1="670" x2="1920" y2="670"></line>
      <line x1="0" y1="770" x2="1920" y2="770"></line>
      <line x1="340" y1="0" x2="340" y2="1080"></line>
      <line x1="540" y1="0" x2="540" y2="1080"></line>
      <line x1="740" y1="0" x2="740" y2="1080"></line>
      <line x1="940" y1="0" x2="940" y2="1080"></line>
      <line x1="1140" y1="0" x2="1140" y2="1080"></line>
      <line x1="1340" y1="0" x2="1340" y2="1080"></line>
      <line x1="1540" y1="0" x2="1540" y2="1080"></line>
      <line x1="1740" y1="0" x2="1740" y2="1080"></line>
    </g>
  </g>

  <rect width="1920" height="1080" fill="url(#gridFade)"></rect>

  
  
  <path d="M 820 780 C 980 775, 1120 760, 1240 720 C 1360 680, 1460 620, 1540 540 C 1620 460, 1680 380, 1720 280" stroke="url(#curveGlowGrad)" stroke-width="44" fill="none" opacity="0.18" filter="url(#ambientBloom)"></path>
  
  <path d="M 820 780 C 980 775, 1120 760, 1240 720 C 1360 680, 1460 620, 1540 540 C 1620 460, 1680 380, 1720 280" stroke="url(#curveGlowGrad)" stroke-width="30" fill="none" opacity="0.35" filter="url(#hugeBloom)"></path>
  
  <path d="M 820 780 C 980 775, 1120 760, 1240 720 C 1360 680, 1460 620, 1540 540 C 1620 460, 1680 380, 1720 280" stroke="url(#curveGlowGrad)" stroke-width="14" fill="none" opacity="0.55" filter="url(#bigBloom)"></path>
  
  <path d="M 820 780 C 980 775, 1120 760, 1240 720 C 1360 680, 1460 620, 1540 540 C 1620 460, 1680 380, 1720 280" stroke="url(#curveGlowGrad)" stroke-width="6" fill="none" opacity="0.75" filter="url(#softBloom)"></path>

  
  <path d="M 1240 722 C 1360 682, 1460 622, 1540 542 C 1620 462, 1680 382, 1720 282" stroke="#5B67F2" stroke-width="1.6" fill="none" opacity="0.15" stroke-linecap="round"></path>
  <path d="M 1240 718 C 1360 678, 1460 618, 1540 538 C 1620 458, 1680 378, 1720 278" stroke="#22C55E" stroke-width="1.6" fill="none" opacity="0.15" stroke-linecap="round"></path>

  
  <path d="M 820 780 C 980 775, 1120 760, 1240 720 C 1360 680, 1460 620, 1540 540 C 1620 460, 1680 380, 1720 280" stroke="url(#curveGrad)" stroke-width="2.8" fill="none" opacity="0.7" filter="url(#edgeDof)"></path>

  
  <path d="M 820 780 C 980 775, 1120 760, 1240 720 C 1360 680, 1460 620, 1540 540 C 1620 460, 1680 380, 1720 280" stroke="url(#curveGrad)" stroke-width="1.8" fill="none" stroke-linecap="round"></path>

  
  <g>
