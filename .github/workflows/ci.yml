name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint & typecheck (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --all-extras --dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy packages

  test-python:
    name: Tests (Python)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync workspace
        run: uv sync --all-extras --dev

      - name: pytest
        run: uv run pytest --cov --cov-fail-under=80

  lint-typescript:
    name: Lint & build (TypeScript)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint
      - run: pnpm -r build

  docker-compose-smoke:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.docker
        run: cp .env.docker.example .env.docker

      - name: Validate compose config
        run: docker compose --env-file .env.docker config >/dev/null

      - name: docker compose up postgres
        run: docker compose --env-file .env.docker up -d postgres

      - name: Wait for postgres healthy
        run: timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U sportslab; do sleep 2; done'

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
      # Full API build smoke skipped -- requires apps/api/Dockerfile from SPO-124.
